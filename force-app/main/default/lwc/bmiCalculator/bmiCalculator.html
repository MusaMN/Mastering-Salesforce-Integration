<template>
    <div class="app slds-var-p-around_medium">
        <div class="box">
            <h1>BMI Calculator</h1>

            <template if:true={result}>
                <section>
                    <h2>Your BMI value is:</h2>
                    <h3 class="result-value">{bmi}</h3>
                    <h2>You are:</h2>
                    <h3 class="result-value">{result}</h3>
                    <lightning-button class="slds-var-p-top_large slds-var-m-top_large" variant="brand" label="Re-Calculate" title="Re-Calculate" stretch onclick={recalculate}></lightning-button>
                </section>
            </template>

            <template if:false={result}>
                <form>
                    <div class="slds-m-top_medium slds-m-bottom_medium">
                        <div class="slds-p-around_small lgc-bg slds-title">
                            <lightning-input type="number" name="height" value={height} label="Height(cm)" min="1" placeholder="Enter your height in cm" required onchange={inputHandler}></lightning-input>
                        </div>
                        <div class="slds-p-around_small lgc-bg slds-title">
                            <lightning-input type="number" name="weight" value={weight} label="Weight(kg)" min="1" placeholder="Enter your weight in kg" required onchange={inputHandler}></lightning-input>
                        </div>
                        <lightning-button variant="brand" label="Calculate" title="calculate" stretch onclick={calculate}></lightning-button>
                    </div>
                </form>
            </template>

            <div class="info-wrapper">
                <h2>What your BMI Means</h2>
                <p class="slds-var-m-bottom_large">Once you have measured your BMI, you can determine your healthy weight range. If your BMI is:</p>

                <h3 class="slds-text-color_error slds-text-heading_medium">Under 18.5</h3>
                <p class="slds-var-m-bottom_large">You are underweight</p>

                <h3 class="slds-text-color_success slds-text-heading_medium">18.5 to 24.9</h3>
                <p class="slds-var-m-bottom_large">You have a healthy weight for young and middle-aged adults</p>

                <h3 class="slds-text-color_error slds-text-heading_medium">25.0 to 29.9</h3>
                <p class="slds-var-m-bottom_large">You are overweight</p>

                <h3 class="slds-text-color_error slds-text-heading_medium">Over 29.9</h3>
                <p class="slds-var-m-bottom_large">You are obese</p>
            </div>
        </div>
    </div>
</template>
